[project]
name = "soill"
version = "0.1.0"
description = "Shared RAG, ingestion, and Postgres/pgvector logic for SOILL chatbot"
readme = "README.md"
requires-python = ">=3.11,<3.14"
dependencies = [
    "python-dotenv>=1.0.1",
    "mistralai==1.2.0",
    "numpy>=1.26.0",
    "psycopg[binary]>=3.2.0",
    "pgvector>=0.3.6",
    "pymupdf>=1.27.0",
    "python-docx>=1.2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/soill"]

[tool.hatch.build.targets.sdist]
packages = ["src/soill"]
